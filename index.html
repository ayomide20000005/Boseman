<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Boseman — Urban Snake Displacement</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<!-- ═══════════════════════════
     SEARCH PAGE
═══════════════════════════ -->
<div id="searchPage" class="page search-page">
    <div class="search-bg-mountain"></div>
    <div class="search-center">
        <div class="brand">
            <h1 class="brand-name">Boseman</h1>
            <p class="brand-sub">Urban Snake Displacement Search Engine</p>
        </div>
        <div class="search-wrap">
            <div class="search-box" id="searchBox">
                <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                <input id="searchInput" class="search-input" type="text" placeholder="Enter a city, region, or coordinates…" autocomplete="off">
                <button id="searchBtn" class="search-submit">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
                </button>
            </div>
            <div id="searchDropdown" class="search-dropdown">
                <div id="recentSection" class="dropdown-section">
                    <div class="dropdown-section-header">
                        <span class="dropdown-section-label">Recent searches</span>
                        <button id="clearAllBtn" class="dropdown-clear-all">Clear all</button>
                    </div>
                    <div id="recentItems" class="dropdown-items"></div>
                </div>
                <div id="autocompleteSection" class="dropdown-section" style="display:none;">
                    <div id="autocompleteItems" class="dropdown-items"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- ═══════════════════════════
     RESULT PAGE
═══════════════════════════ -->
<div id="resultPage" class="page result-page hidden">

    <!-- Top bar -->
    <header class="result-topbar">
        <button id="backBtn" class="back-btn" title="Back">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <div class="topbar-search-wrap">
            <svg class="topbar-pin" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
            <input id="topbarInput" class="topbar-input" type="text" placeholder="Search again…" autocomplete="off">
            <button id="topbarSearchBtn" class="topbar-search-btn">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
            </button>
        </div>
        <div class="topbar-actions">
            <button id="exportBtn" class="topbar-action-btn" title="Export Results">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                <span>Export</span>
            </button>
            <button id="saveLocationBtn" class="topbar-action-btn" title="Save Location">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
                <span>Save</span>
            </button>
            <button id="showMapBtn" class="topbar-map-btn">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/><line x1="9" y1="3" x2="9" y2="18"/><line x1="15" y1="6" x2="15" y2="21"/></svg>
                Map
            </button>
            <button id="openDrawerBtn" class="topbar-action-btn drawer-toggle" title="View Species List">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                <span>Species</span>
            </button>
        </div>
    </header>

    <!-- Results body -->
    <main class="result-body" id="resultBody">

        <!-- Content header -->
        <div class="result-header">
            <div class="result-header-left">
                <span class="result-query-label">Location-Based Query</span>
                <h1 id="resultTitle" class="result-title">Searching…</h1>
                <p id="resultSubtitle" class="result-subtitle"></p>
            </div>
            <div id="riskBadge" class="risk-badge hidden">
                <span id="riskBadgeNum" class="risk-badge-num">—</span>
                <span class="risk-badge-label">USDRI</span>
                <span id="riskBadgeLevel" class="risk-badge-level">—</span>
            </div>
        </div>

        <!-- Safety ribbon -->
        <div id="safetyRibbon" class="safety-ribbon hidden">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            <span id="safetyText"></span>
        </div>

        <!-- Filter chips -->
        <div id="filterChips" class="filter-chips hidden">
            <button class="filter-chip active" data-filter="all">All</button>
            <button class="filter-chip" data-filter="venomous">Venomous Only</button>
            <button class="filter-chip" data-filter="inat">iNaturalist</button>
            <button class="filter-chip" data-filter="gbif">GBIF</button>
            <button class="filter-chip" data-filter="photo">Has Photo</button>
        </div>

        <!-- Trends section (collapsible) -->
        <div id="trendsSection" class="trends-section hidden">
            <button id="toggleTrendsBtn" class="trends-toggle">
                <span>Sighting Trends</span>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
            </button>
            <div id="trendsContent" class="trends-content hidden">
                <div id="trendsChart" class="trends-chart">
                    <p class="trends-placeholder">Trend data will appear here based on historical sightings.</p>
                </div>
            </div>
        </div>

        <!-- Skeletons while loading -->
        <div id="resultSkeletons" class="result-skeletons">
            <div class="skeleton-card"><div class="sk-img"></div><div class="sk-body"><div class="sk-line wide"></div><div class="sk-line medium"></div><div class="sk-line short"></div><div class="sk-bar"></div></div></div>
            <div class="skeleton-card"><div class="sk-img"></div><div class="sk-body"><div class="sk-line wide"></div><div class="sk-line medium"></div><div class="sk-line short"></div><div class="sk-bar"></div></div></div>
            <div class="skeleton-card"><div class="sk-img"></div><div class="sk-body"><div class="sk-line wide"></div><div class="sk-line medium"></div><div class="sk-line short"></div><div class="sk-bar"></div></div></div>
            <div class="skeleton-card"><div class="sk-img"></div><div class="sk-body"><div class="sk-line wide"></div><div class="sk-line medium"></div><div class="sk-line short"></div><div class="sk-bar"></div></div></div>
        </div>

        <!-- Species/sighting cards -->
        <div id="speciesCards" class="species-cards hidden"></div>

        <!-- Load more -->
        <div id="loadMoreWrap" class="load-more-wrap hidden">
            <button id="loadMoreBtn" class="load-more-btn">Show more results</button>
            <p id="showingCount" class="showing-count"></p>
        </div>

    </main>

    <!-- Right drawer (species list) -->
    <div id="rightDrawer" class="right-drawer hidden">
        <div class="drawer-header">
            <span class="drawer-title">Species Found</span>
            <button id="closeDrawerBtn" class="close-drawer-btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>
        <div id="drawerContent" class="drawer-content">
            <p class="drawer-empty">Search a location to see species list.</p>
        </div>
    </div>
    <div id="drawerOverlay" class="drawer-overlay hidden"></div>

    <!-- Map panel -->
    <div id="mapPanel" class="map-panel hidden">
        <div class="map-panel-header">
            <span class="map-panel-title">Map View</span>
            <button id="closeMapBtn" class="close-map-btn">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>
        <div id="map" class="map-container"></div>
    </div>

    <!-- Compare panel -->
    <div id="comparePanel" class="compare-panel hidden">
        <div class="compare-header">
            <span class="compare-title">Compare Locations</span>
            <button id="closeCompare" class="close-compare">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>
        <div class="compare-tabs">
            <button class="compare-tab active" data-tab="0">Location A</button>
            <button class="compare-tab" data-tab="1">Location B</button>
        </div>
        <div class="compare-body">
            <div class="compare-col active" id="compareColA">
                <div class="compare-search-wrap">
                    <input id="compareInputA" class="compare-input" type="text" placeholder="First location…">
                    <button class="compare-search-btn" data-col="A">→</button>
                </div>
                <div id="compareResultA" class="compare-result"></div>
            </div>
            <div class="compare-col" id="compareColB">
                <div class="compare-search-wrap">
                    <input id="compareInputB" class="compare-input" type="text" placeholder="Second location…">
                    <button class="compare-search-btn" data-col="B">→</button>
                </div>
                <div id="compareResultB" class="compare-result"></div>
            </div>
        </div>
    </div>

    <!-- Scroll to top button -->
    <button id="scrollTopBtn" class="scroll-top-btn hidden" title="Scroll to top">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="18 15 12 9 6 15"/></svg>
        <span>Top</span>
    </button>

    <!-- Mobile bottom nav -->
    <nav class="mobile-bottom-nav">
        <button class="mob-nav-btn active" id="mobNavResults">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <span>Results</span>
        </button>
        <button class="mob-nav-btn" id="mobNavMap">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/><line x1="9" y1="3" x2="9" y2="18"/><line x1="15" y1="6" x2="15" y2="21"/></svg>
            <span>Map</span>
        </button>
        <button class="mob-nav-btn" id="mobNavCompare">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
            <span>Compare</span>
        </button>
        <button class="mob-nav-btn" id="mobNavShare">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
            <span>Share</span>
        </button>
    </nav>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="app.js"></script>
</body>
</html>
