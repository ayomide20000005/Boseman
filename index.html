<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Boseman — Urban Snake Displacement</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

<!-- ═══════════════════════════
     SEARCH PAGE
═══════════════════════════ -->
<div id="searchPage" class="page search-page">
    <div class="search-bg-mountain"></div>

    <div class="search-center">
        <div class="brand">
            <h1 class="brand-name">Boseman</h1>
            <p class="brand-sub">Urban Snake Displacement Search</p>
        </div>

        <div class="search-wrap">
            <div class="search-box" id="searchBox">
                <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                <input id="searchInput" class="search-input" type="text" placeholder="Enter a city, region, or coordinates…" autocomplete="off">
                <button id="searchBtn" class="search-submit">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
                </button>
            </div>

            <!-- Unified dropdown: recent + autocomplete -->
            <div id="searchDropdown" class="search-dropdown">
                <div id="recentSection" class="dropdown-section">
                    <div class="dropdown-section-header">
                        <span class="dropdown-section-label">Recent searches</span>
                        <button id="clearAllBtn" class="dropdown-clear-all">Clear all</button>
                    </div>
                    <div id="recentItems" class="dropdown-items"></div>
                </div>
                <div id="autocompleteSection" class="dropdown-section" style="display:none;">
                    <div id="autocompleteItems" class="dropdown-items"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- ═══════════════════════════
     RESULT PAGE
═══════════════════════════ -->
<div id="resultPage" class="page result-page hidden">

    <!-- Fixed top bar -->
    <div class="result-topbar">
        <button id="backBtn" class="back-btn" title="Back to search">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <div class="topbar-search-wrap">
            <svg class="topbar-pin" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
            <input id="topbarInput" class="topbar-input" type="text" placeholder="Search again…" autocomplete="off">
            <button id="topbarSearchBtn" class="topbar-search-btn">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
            </button>
        </div>
    </div>

    <!-- Map -->
    <div id="map" class="map-container"></div>

    <!-- Floating result card -->
    <div id="resultCard" class="result-card">
        <div class="card-handle" id="cardHandle"></div>

        <!-- Collapsed state -->
        <div id="cardCollapsed" class="card-collapsed">
            <div class="card-location-row">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                <span id="cardLocationName" class="card-location-name">—</span>
            </div>
            <!-- Skeleton shown while loading -->
            <div id="cardSkeleton" class="card-skeleton">
                <div class="skeleton-line wide"></div>
                <div class="skeleton-line medium"></div>
                <div class="skeleton-actions">
                    <div class="skeleton-btn"></div>
                    <div class="skeleton-btn"></div>
                    <div class="skeleton-btn"></div>
                </div>
            </div>
            <!-- Real content shown after data loads -->
            <div id="cardContent" class="card-content hidden">
                <div class="card-verdict-row">
                    <span id="cardVerdict" class="card-verdict"></span>
                    <span id="cardSummary" class="card-summary"></span>
                </div>
                <div class="card-actions">
                    <button class="card-btn primary" id="viewScoreBtn">View Score</button>
                    <button class="card-btn" id="viewMapBtn">View on Map</button>
                    <button class="card-btn" id="compareBtn">Compare</button>
                    <button class="card-btn" id="shareBtn">Share</button>
                </div>
            </div>
        </div>

        <!-- Expanded state -->
        <div id="cardExpanded" class="card-expanded hidden">
            <div class="expand-header">
                <span class="expand-title">Full Analysis</span>
                <button id="collapseBtn" class="collapse-btn">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="18 15 12 9 6 15"/></svg>
                </button>
            </div>

            <!-- Score -->
            <div class="score-section">
                <div class="score-gauge">
                    <svg class="gauge-svg" viewBox="0 0 120 70" xmlns="http://www.w3.org/2000/svg">
                        <path class="gauge-track" d="M10 65 A55 55 0 0 1 110 65" fill="none" stroke-width="8" stroke-linecap="round"/>
                        <path id="gaugeFill" class="gauge-fill" d="M10 65 A55 55 0 0 1 110 65" fill="none" stroke-width="8" stroke-linecap="round" stroke-dasharray="0 173"/>
                    </svg>
                    <div class="gauge-center">
                        <span id="scoreNum" class="score-num">—</span>
                        <span class="score-denom">/100</span>
                    </div>
                </div>
                <div class="score-meta">
                    <span id="scoreLabel" class="score-label">—</span>
                    <span id="scoreInterpretation" class="score-interpretation"></span>
                </div>
            </div>

            <!-- Sub-scores -->
            <div id="subScores" class="sub-scores"></div>

            <!-- Stats row -->
            <div id="statsRow" class="stats-row"></div>

            <!-- Sightings -->
            <div class="sightings-section">
                <div class="section-title-row">
                    <span class="section-title">Sightings and Records</span>
                    <span id="sightingsCount" class="sightings-count"></span>
                </div>
                <div id="sightingsList" class="sightings-list"></div>
            </div>

            <!-- Species info -->
            <div id="speciesSection" class="species-section hidden">
                <div class="section-title-row">
                    <span class="section-title">Species Info</span>
                </div>
                <div id="speciesBody" class="species-body"></div>
            </div>
        </div>
    </div>

    <!-- Compare panel -->
    <div id="comparePanel" class="compare-panel hidden">
        <div class="compare-header">
            <span class="compare-title">Compare Locations</span>
            <button id="closeCompare" class="close-compare">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>
        <!-- Mobile: tabs. Desktop: side by side -->
        <div class="compare-tabs" id="compareTabs">
            <button class="compare-tab active" data-tab="0">Location A</button>
            <button class="compare-tab" data-tab="1">Location B</button>
        </div>
        <div class="compare-body">
            <div class="compare-col active" id="compareColA">
                <div class="compare-search-wrap">
                    <input id="compareInputA" class="compare-input" type="text" placeholder="First location…">
                    <button class="compare-search-btn" data-col="A">→</button>
                </div>
                <div id="compareResultA" class="compare-result"></div>
            </div>
            <div class="compare-col" id="compareColB">
                <div class="compare-search-wrap">
                    <input id="compareInputB" class="compare-input" type="text" placeholder="Second location…">
                    <button class="compare-search-btn" data-col="B">→</button>
                </div>
                <div id="compareResultB" class="compare-result"></div>
            </div>
        </div>
    </div>

    <!-- Loading overlay -->
    <div id="loadingOverlay" class="loading-overlay hidden">
        <div class="loading-inner">
            <div class="loading-spinner"></div>
            <span class="loading-text">Searching…</span>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="app.js"></script>
</body>
</html>
