<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Boseman</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Serif+Display&display=swap" rel="stylesheet"/>
</head>
<body>

  <div class="topbar">
    <button class="mode-toggle" id="modeToggle">
      <span class="mode-label" id="modeLabel">Dark mode</span>
      <div class="mode-switch">
        <div class="mode-thumb"></div>
      </div>
    </button>
  </div>

  <main class="stage">

    <h1 class="logo">Boseman</h1>
    <p class="tagline">Urban Snake Displacement Search</p>

    <div class="search-wrap">
      <div class="search-bar">
        <input
          type="text"
          id="searchInput"
          class="search-input"
          placeholder="Search species, location, habitat..."
          autocomplete="off"
        />
        <button class="search-btn" id="searchBtn">
          <span class="b-letter" id="bLetter">b</span>
        </button>
      </div>

      <div class="tools-row">
        <button class="tools-toggle" id="toolsToggle">Tools</button>
      </div>

      <div class="chips-row" id="chipsRow">
        <button class="chip" data-filter="species">Species</button>
        <button class="chip" data-filter="location">Location</button>
        <button class="chip" data-filter="hospitals">Hospitals</button>
        <button class="chip" data-filter="habitat">Habitat Loss</button>
        <button class="chip" data-filter="urban">Urban Sprawl</button>
        <label class="chip upload-chip">
          Image Upload
          <input type="file" id="imageUpload" accept="image/*" hidden/>
        </label>
      </div>

    </div>

  </main>

  <script src="app.js"></script>
</body>
</html>
