<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Boseman</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet"/>
</head>
<body>

  <main class="stage">

    <div class="hero">
      <h1 class="logo">Boseman</h1>
      <p class="tagline">Urban Snake Displacement Search</p>
    </div>

    <div class="search-container">

      <!-- Tools strip — slides above search bar -->
      <div class="tools-strip" id="toolsStrip">
        <button class="tool-chip" data-tool="species">Species</button>
        <button class="tool-chip" data-tool="location">Location</button>
        <button class="tool-chip" data-tool="hospitals">Hospitals</button>
        <button class="tool-chip" data-tool="habitat">Habitat Loss</button>
        <button class="tool-chip" data-tool="urban">Urban Sprawl</button>
      </div>

      <!-- Search bar -->
      <div class="search-bar" id="searchBar">

        <!-- Tools button — left -->
        <button class="tools-btn" id="toolsBtn" title="Tools">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="4" y1="6" x2="20" y2="6"/>
            <line x1="4" y1="12" x2="20" y2="12"/>
            <line x1="4" y1="18" x2="20" y2="18"/>
          </svg>
          <span>Tools</span>
        </button>

        <div class="divider"></div>

        <!-- Plus button — after Tools -->
        <div class="plus-wrap" id="plusWrap">
          <button class="plus-btn" id="plusBtn" title="Upload">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="5" x2="12" y2="19"/>
              <line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
          </button>

          <!-- Upload dropdown — vertical, shows on plus click -->
          <div class="upload-dropdown" id="uploadDropdown">
            <label class="upload-option" id="uploadImageLabel">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="2"/>
                <circle cx="8.5" cy="8.5" r="1.5"/>
                <polyline points="21 15 16 10 5 21"/>
              </svg>
              <span>Upload Image</span>
              <input type="file" id="imageUpload" accept="image/*" hidden/>
            </label>
            <label class="upload-option" id="uploadFileLabel">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                <polyline points="14 2 14 8 20 8"/>
              </svg>
              <span>Upload File</span>
              <input type="file" id="fileUpload" accept=".pdf,.csv,.txt,.json" hidden/>
            </label>
          </div>
        </div>

        <div class="divider"></div>

        <!-- Search input -->
        <input
          type="text"
          id="searchInput"
          class="search-input"
          placeholder="Search species, location, habitat..."
          autocomplete="off"
        />

        <!-- Rolling b button — right -->
        <button class="search-btn" id="searchBtn" title="Search">
          <span class="b-letter">b</span>
        </button>

      </div>

      <!-- Active filters shown below bar -->
      <div class="active-bar" id="activeBar"></div>

    </div>

  </main>

  <script src="app.js"></script>
</body>
</html>
