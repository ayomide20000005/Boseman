<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Boseman</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>

  <!-- ══════════════════════════════
       SEARCH PAGE
  ══════════════════════════════ -->
  <main class="stage" id="searchStage">

    <div class="hero">
      <h1 class="logo">Boseman</h1>
      <p class="tagline">Urban Snake Displacement Search</p>
    </div>

    <div class="persona-list" id="personaList">
      <button class="persona-item active" data-persona="Researcher" data-icon="🔬">🔬 Researcher</button>
      <button class="persona-item" data-persona="Health Worker" data-icon="🏥">🏥 Health Worker</button>
      <button class="persona-item" data-persona="Resident" data-icon="🏘️">🏘️ Resident</button>
      <button class="persona-item" data-persona="Urban Planner" data-icon="🏙️">🏙️ Urban Planner</button>
      <button class="persona-item" data-persona="Wildlife Responder" data-icon="🐍">🐍 Wildlife Responder</button>
      <button class="persona-item" data-persona="Farmer" data-icon="🌾">🌾 Farmer</button>
      <button class="persona-item" data-persona="Journalist" data-icon="📰">📰 Journalist</button>
      <button class="persona-item" data-persona="Student" data-icon="📚">📚 Student</button>
      <button class="persona-item" data-persona="Tour Guide" data-icon="🗺️">🗺️ Tour Guide</button>
      <button class="persona-item" data-persona="First Responder" data-icon="🚨">🚨 First Responder</button>
    </div>

    <div class="search-container">
      <div class="tools-strip" id="toolsStrip">
        <button class="tool-chip" data-tool="species">Species</button>
        <button class="tool-chip" data-tool="location">Location</button>
        <button class="tool-chip" data-tool="hospitals">Hospitals</button>
        <button class="tool-chip" data-tool="habitat">Habitat Loss</button>
        <button class="tool-chip" data-tool="urban">Urban Sprawl</button>
      </div>

      <div class="search-bar" id="searchBar">
        <button class="tools-btn" id="toolsBtn" title="Tools">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="4" y1="6" x2="20" y2="6"/>
            <line x1="4" y1="12" x2="20" y2="12"/>
            <line x1="4" y1="18" x2="20" y2="18"/>
          </svg>
          <span>Tools</span>
        </button>
        <div class="divider"></div>
        <div class="plus-wrap" id="plusWrap">
          <button class="plus-btn" id="plusBtn" title="Upload">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="5" x2="12" y2="19"/>
              <line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
          </button>
          <div class="upload-dropdown" id="uploadDropdown">
            <label class="upload-option">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="2"/>
                <circle cx="8.5" cy="8.5" r="1.5"/>
                <polyline points="21 15 16 10 5 21"/>
              </svg>
              <span>Upload Image</span>
              <input type="file" id="imageUpload" accept="image/*" hidden/>
            </label>
            <label class="upload-option">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                <polyline points="14 2 14 8 20 8"/>
              </svg>
              <span>Upload File</span>
              <input type="file" id="fileUpload" accept=".pdf,.csv,.txt,.json" hidden/>
            </label>
          </div>
        </div>
        <div class="divider"></div>
        <input type="text" id="searchInput" class="search-input" placeholder="Search species, location, habitat..." autocomplete="off"/>
        <button class="search-btn" id="searchBtn" title="Search">
          <span class="b-letter">b</span>
        </button>
      </div>
      <div class="active-bar" id="activeBar"></div>
    </div>

  </main>

  <!-- ══════════════════════════════
       RESULTS PAGE
  ══════════════════════════════ -->
  <div class="results-page" id="resultsPage">

    <div class="results-topbar">
      <button class="back-btn" id="backBtn">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
        Back
      </button>
      <div class="results-search-wrap">
        <input type="text" id="resultsSearchInput" class="results-search-input" placeholder="Search again..."/>
        <button class="results-search-btn" id="resultsSearchBtn"><span class="b-letter-sm">b</span></button>
      </div>
      <div class="topbar-right">
        <span class="results-query-label" id="resultsQueryLabel"></span>
        <div class="active-persona-badge" id="activePersonaBadge"></div>
        <button class="map-expand-btn" id="mapExpandBtn">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/>
          </svg>
          Show Map
        </button>
      </div>
    </div>

    <div class="results-body" id="resultsBody">

      <!-- CONTENT PANEL -->
      <div class="results-panel" id="resultsPanel">

        <!-- Scroll hint -->
        <div class="scroll-hint" id="scrollHint">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
          Scroll for more
        </div>

        <!-- Risk Hero -->
        <div class="risk-hero section-block" id="riskHero" style="display:none;">
          <div class="risk-score-wrap">
            <div class="risk-score-circle" id="riskCircle">
              <span class="risk-num" id="riskNum">--</span>
              <span class="risk-max">/100</span>
            </div>
            <div class="risk-info">
              <span class="risk-label" id="riskLabel">Calculating...</span>
              <span class="risk-interpretation" id="riskInterpretation"></span>
            </div>
          </div>
          <div class="risk-components" id="riskComponents"></div>
        </div>

        <!-- AI Strip -->
        <div class="section-block ai-strip">
          <button class="section-toggle ai-toggle" id="aiToggle">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/>
              <line x1="12" y1="8" x2="12" y2="12"/>
              <line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
            <span>AI Insight</span>
            <svg class="section-chevron" id="aiChevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="6 9 12 15 18 9"/>
            </svg>
          </button>
          <div class="ai-panel section-content" id="aiPanel">
            <div class="ai-messages" id="aiMessages"></div>
            <div class="ai-input-wrap">
              <input type="text" class="ai-input" id="aiInput" placeholder="Ask a follow-up..."/>
              <button class="ai-send-btn" id="aiSendBtn">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <line x1="22" y1="2" x2="11" y2="13"/>
                  <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                </svg>
              </button>
            </div>
          </div>
        </div>

        <!-- Stats -->
        <div class="section-block stats-bar" id="statsBar"></div>

        <!-- Persona Sections — rendered dynamically by app.js -->
        <div id="personaSections"></div>

      </div>

      <!-- MAP PANEL -->
      <div class="map-panel" id="mapPanel">
        <div class="map-panel-header">
          <span class="map-panel-title">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/>
            </svg>
            Map
          </span>
          <div class="layer-controls">
            <button class="layer-btn active" data-layer="sightings">Sightings</button>
            <button class="layer-btn" data-layer="habitat">Habitat Loss</button>
            <button class="layer-btn" data-layer="urban">Urban Sprawl</button>
          </div>
          <button class="map-collapse-btn" id="mapCollapseBtn">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"/>
              <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
            Close Map
          </button>
        </div>
        <div id="map"></div>
      </div>

    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
