<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Boseman</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet"/>
</head>
<body>

  <main class="stage">

    <div class="hero">
      <h1 class="logo">Boseman</h1>
      <p class="tagline">Urban Snake Displacement Search</p>
    </div>

    <div class="search-container">

      <!-- Tools strip — appears above search bar when Tools clicked -->
      <div class="tools-strip" id="toolsStrip">
        <button class="tool-chip" data-tool="species">Species</button>
        <button class="tool-chip" data-tool="location">Location</button>
        <button class="tool-chip" data-tool="hospitals">Hospitals</button>
        <button class="tool-chip" data-tool="habitat">Habitat Loss</button>
        <button class="tool-chip" data-tool="urban">Urban Sprawl</button>
        <label class="tool-chip upload-chip" data-tool="image">
          Image Upload
          <input type="file" id="imageUpload" accept="image/*" hidden/>
        </label>
      </div>

      <!-- Search bar with Tools button on left, rolling b on right -->
      <div class="search-bar" id="searchBar">
        <button class="tools-btn" id="toolsBtn" title="Tools">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="4" y1="6" x2="20" y2="6"/>
            <line x1="4" y1="12" x2="20" y2="12"/>
            <line x1="4" y1="18" x2="20" y2="18"/>
          </svg>
          <span>Tools</span>
        </button>

        <div class="divider"></div>

        <input
          type="text"
          id="searchInput"
          class="search-input"
          placeholder="Search species, location, habitat..."
          autocomplete="off"
        />

        <button class="search-btn" id="searchBtn" title="Search">
          <span class="b-letter">b</span>
        </button>
      </div>

      <!-- Active filters display -->
      <div class="active-bar" id="activeBar"></div>

    </div>

  </main>

  <script src="app.js"></script>
</body>
</html>
